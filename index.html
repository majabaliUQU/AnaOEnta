        options:[

            "حسب المزاج",

        ],

        options:[
            "أنا",
            "أنت",
            "إحنا الاثنين",
            "مستحيل"
        ],
        match:"الثقة انتهت رسميًا 😂",

    },

        question:"مين أكثر شخص يسوي دراما؟",

            "أنا",
            "أنت",
            "إحنا الاثنين",

/ =====================================================
    AUDIO
===================================================== /

let audioCtx = null;

function initAudio(){

    if(!audioCtx){

        audioCtx = new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

    }

}

function beep(freq = 220, duration = 0.08){

    initAudio();

    const osc = audioCtx.createOscillator();

    const gain = audioCtx.createGain();

    osc.frequency.value = freq;

    osc.type = "sine";

    osc.connect(gain);

    gain.connect(audioCtx.destination);

    gain.gain.value = 0.03;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + duration
    );

    osc.stop(audioCtx.currentTime + duration);

}

/ =====================================================
    HELPERS
===================================================== /

function vibrate(ms){

    if(navigator.vibrate){
        navigator.vibrate(ms);
    }

}

function fullscreen(){

    if(!document.fullscreenElement){

        document.documentElement.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}

async function shareGame(){

    const data = {

        title:"أنا وأنت",

        text:"لعبة اجتماعية مضحكة لشخصين 😂",

        url:location.href

    };

    if(navigator.share){

        try{
            await navigator.share(data);
        }catch(e){}

    }else{

        navigator.clipboard.writeText(location.href);

        alert("تم نسخ الرابط");

    }

}

/ =====================================================
    UI HELPERS
===================================================== /

function createButton(
    scene,
    x,
    y,
    width,
    height,
    text,
    color,
    callback
){

    const container = scene.add.container(x,y);

    const bg = scene.add.rectangle(
        0,
        0,
        width,
        height,
        color,
        1
    );

    bg.setStrokeStyle(
        2,
        0xffffff,
        0.12
    );

    bg.setRadius(24);

    const label = scene.add.text(
        0,
        0,
        text,
        {
            fontFamily:"Alexandria",
            fontSize:"28px",
            color:"#ffffff"
        }
    )
    .setOrigin(0.5);

    container.add([bg,label]);

    bg.setInteractive({useHandCursor:true});

    bg.on("pointerdown",()=>{

        beep(260);

        vibrate(40);

        scene.tweens.add({

            targets:container,

            scale:0.93,

            duration:80,

            yoyo:true

        });

        callback();

    });

    return container;

}

function createBackground(scene){

    const width = scene.scale.width;
    const height = scene.scale.height;

    const graphics = scene.add.graphics();

    graphics.fillGradientStyle(
        0x0f1020,
        0x1d2140,
        0x1d2140,
        0x0f1020,
        1
    );

    graphics.fillRect(
        0,
        0,
        width,
        height
    );

    for(let i=0;i<16;i++){

        const circle = scene.add.circle(
            Phaser.Math.Between(0,width),
            Phaser.Math.Between(0,height),
            Phaser.Math.Between(20,90),
            Phaser.Display.Color.RandomRGB().color,
            0.08
        );

        scene.tweens.add({

            targets:circle,

            y:circle.y - 40,

            duration:Phaser.Math.Between(3000,7000),

            yoyo:true,

            repeat:-1

        });

    }

}

/ =====================================================
    SCENES
===================================================== /

class MainMenu extends Phaser.Scene{

                fontStyle:"700"
            }

        ).setOrigin(0.5);

        this.tweens.add({

            targets:title,

            scale:1.04,

            duration:1200,

            yoyo:true,

            repeat:-1

        });

        this.add.text(

            centerX,

            210,

            "لعبة تصنع لحظات لا تُنسى",

            {
                fontFamily:"Alexandria",
                fontSize:"22px",
                color:"#c8c8d8"
            }

        ).setOrigin(0.5);

        createButton(
            this,
            centerX,
            350,
            320,
            80,
            "ابدأ اللعبة",
            0xff4d8d,
            ()=>{

                this.scene.start("PlayerSetup");

            }
        );

        createButton(
            this,
            centerX,
            460,
            320,

            0x7c5cff,
            ()=>{

                shareGame();

            }
        );

        createButton(
            this,
            centerX,
            570,
            320,
            80,
            "تكبير الشاشة",

        const dev = this.add.text(

            this.scale.height - 40,

                fontSize:"18px",

            }

        )

        .setInteractive({useHandCursor:true});

        dev.on("pointerdown",()=>{

            window.open(
                "https://wa.me/966505501575",
                "_blank"
            );

        });

}

class PlayerSetup extends Phaser.Scene{

    constructor(){

        super("PlayerSetup");

    }

    create(){

        createBackground(this);

        const centerX = this.scale.width / 2;

        this.add.text(

            centerX,

            120,

            "أدخلوا أسماءكم",

            {
                fontFamily:"Alexandria",
                fontSize:"42px",
                color:"#ffffff"
            }

        ).setOrigin(0.5);

        const input1 = this.createInput(
            250,
            "اسم اللاعب الأول"
        );

        const input2 = this.createInput(
            370,
            "اسم اللاعب الثاني"
        );

        createButton(
            this,
            centerX,
            560,
            280,
            80,
            "ابدأ",
            0xff4d8d,
            ()=>{

                GAME_STATE.players[0].name =
                    input1.value || "اللاعب الأول";

                GAME_STATE.players[1].name =
                    input2.value || "اللاعب الثاني";

                input1.remove();
                input2.remove();

                this.scene.start("QuestionScene");

            }
        );

    }

    createInput(top,placeholder){

        const input = document.createElement("input");

        input.placeholder = placeholder;

        Object.assign(input.style,{

            position:"absolute",

            left:"50%",

            top:top+"px",

            transform:"translateX(-50%)",

            width:"80%",

            maxWidth:"340px",

            height:"64px",

            borderRadius:"22px",

            border:"2px solid rgba(255,255,255,0.1)",

            background:"rgba(255,255,255,0.08)",

            color:"#ffffff",

            fontFamily:"Alexandria",

            fontSize:"22px",

            padding:"0 20px",

            outline:"none",

            textAlign:"center",

            backdropFilter:"blur(10px)"

        });

        document.body.appendChild(input);

        return input;

    }

}

class QuestionScene extends Phaser.Scene{

    constructor(){

        super("QuestionScene");

    }

    create(){

        createBackground(this);

        const centerX = this.scale.width / 2;

        const currentQuestion =
            QUESTION_PACK[GAME_STATE.currentQuestionIndex];

        const player =
            GAME_STATE.players[GAME_STATE.currentPlayer];

        this.add.text(

            centerX,

            90,

            "دور " + player.name + " " + player.emoji,

            {
                fontFamily:"Alexandria",
                fontSize:"34px",
                color:"#ffffff"
            }

        ).setOrigin(0.5);

        const timerText = this.add.text(

            centerX,

            160,

            "5",

            {
                fontFamily:"Alexandria",
                fontSize:"58px",
                color:"#ff4d8d"
            }

        ).setOrigin(0.5);

        let count = 5;

        this.time.addEvent({

            delay:1000,

            repeat:4,

            callback:()=>{

                count--;

                timerText.setText(count);

                beep(500,0.03);

            }

        });

        const card = this.add.rectangle(

            centerX,

            310,

            350,

            180,

            0xffffff,

            0.08

        );

        card.setRadius(26);

        card.setStrokeStyle(
            2,
            0xffffff,
            0.1
        );

        this.add.text(

            centerX,

            310,

            currentQuestion.question,

            {
                fontFamily:"Alexandria",
                fontSize:"28px",
                color:"#ffffff",
                align:"center",
                wordWrap:{
                    width:300
                }
            }

        ).setOrigin(0.5);

        currentQuestion.options.forEach((option,index)=>{

            const y = 480 + (index * 90);

            const button = createButton(

                this,

                centerX,

                y,

                320,

                70,

                option,

                0xffffff,

                ()=>{

                    this.answer(option);

                }

            );

            button.first.fillColor = 0xffffff;
            button.first.fillAlpha = 0.08;

        });

    }

    answer(option){

        const playerIndex = GAME_STATE.currentPlayer;

        GAME_STATE.playerAnswers[playerIndex] = option;

        this.cameras.main.shake(160,0.004);

        beep(180,0.1);

        if(playerIndex === 0){

            GAME_STATE.currentPlayer = 1;

            this.scene.restart();

        }else{

            GAME_STATE.currentPlayer = 0;

            this.scene.start("RevealScene");

        }

    }

}

class RevealScene extends Phaser.Scene{

    constructor(){

        super("RevealScene");

    }

    create(){

        createBackground(this);

        const centerX = this.scale.width / 2;

        const currentQuestion =
            QUESTION_PACK[GAME_STATE.currentQuestionIndex];

        const answer1 =
            GAME_STATE.playerAnswers[0];

        const answer2 =
            GAME_STATE.playerAnswers[1];

        const match = answer1 === answer2;

        this.add.text(

            centerX,

            100,

            match ? "🎉 تطابق!" : "💀 اختلاف!",

            {
                fontFamily:"Alexandria",
                fontSize:"52px",
                color:match ? "#00e676" : "#ff5252"
            }

        ).setOrigin(0.5);

        this.add.text(

            centerX,

            260,

            GAME_STATE.players[0].name +
            "\nاختار:\n" +
            answer1,

            {
                fontFamily:"Alexandria",
                fontSize:"28px",
                color:"#ffffff",
                align:"center"
            }

        ).setOrigin(0.5);

        this.add.text(

            centerX,

            470,

            GAME_STATE.players[1].name +
            "\nاختار:\n" +
            answer2,

            {
                fontFamily:"Alexandria",
                fontSize:"28px",
                color:"#ffffff",
                align:"center"
            }

        ).setOrigin(0.5);

        if(match){

            GAME_STATE.stats.matches++;

            this.cameras.main.shake(400,0.005);

            beep(640,0.15);

            this.add.text(

                centerX,

                620,

                currentQuestion.match,

                {
                    fontFamily:"Alexandria",
                    fontSize:"30px",
                    color:"#00e676",
                    align:"center",
                    wordWrap:{
                        width:320
                    }
                }

            ).setOrigin(0.5);

            for(let i=0;i<18;i++){

                const confetti = this.add.circle(

                    Phaser.Math.Between(0,this.scale.width),

                    -20,

                    Phaser.Math.Between(4,10),

                    Phaser.Display.Color.RandomRGB().color

                );

                this.tweens.add({

                    targets:confetti,

                    y:this.scale.height + 50,

                    x:confetti.x +
                      Phaser.Math.Between(-100,100),

                    angle:360,

                    duration:2500,

                    ease:"Sine.easeIn"

                });

            }

        }else{

            GAME_STATE.stats.mismatches++;

            this.cameras.main.flash(
                300,
                255,
                0,
                0
            );

            beep(120,0.2);

            this.add.text(

                centerX,

                620,

                currentQuestion.mismatch,

                {
                    fontFamily:"Alexandria",
                    fontSize:"30px",
                    color:"#ff5252",
                    align:"center",
                    wordWrap:{
                        width:320
                    }
                }

            ).setOrigin(0.5);

        }

        this.add.text(

            centerX,

            710,

            dynamicComment(),

            {
                fontFamily:"Alexandria",
                fontSize:"18px",
                color:"#c8c8d8",
                align:"center",
                wordWrap:{
                    width:320
                }
            }

        ).setOrigin(0.5);

        createButton(

            this,

            centerX,

            820,

            300,

            76,

            "السؤال التالي",

            0x7c5cff,

            ()=>{

                GAME_STATE.playerAnswers = [null,null];

                GAME_STATE.currentQuestionIndex++;

                if(
                    GAME_STATE.currentQuestionIndex >=
                    QUESTION_PACK.length
                ){

                    GAME_STATE.currentQuestionIndex = 0;

                }

                this.scene.start("QuestionScene");

            }

        );

    }

}

function dynamicComment(){

    if(
        GAME_STATE.stats.matches >
        GAME_STATE.stats.mismatches
    ){

        return "واضح إنكم تفكروا بنفس الطريقة 😂";

    }

    if(
        GAME_STATE.stats.mismatches >
        GAME_STATE.stats.matches
    ){

        return "واضح إن الثقة بدأت تنهار 💀";

    }

    return "العلاقة ما زالت تحت الاختبار 👀";

}

/ =====================================================
    GAME CONFIG
===================================================== */

const config = {

    type:Phaser.AUTO,

    parent:"game",

    width:390,

    height:844,

    backgroundColor:"#0f1020",

    scale:{
        mode:Phaser.Scale.FIT,
        autoCenter:Phaser.Scale.CENTER_BOTH
    },

    scene:[
        MainMenu,
        PlayerSetup,
        QuestionScene,
        RevealScene
    ]

};

new Phaser.Game(config);

</script>
