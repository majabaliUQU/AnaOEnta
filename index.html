class MainMenu extends Phaser.Scene{

    constructor(){
        super("MainMenu");
    }

    create(){

        this.createBackground();

        const centerX = this.cameras.main.width/2;

        const title = this.add.text(centerX,120,"أنا وأنت",{
            fontFamily:"Alexandria",
            fontSize:"56px",
            color:"#ffffff",
            fontStyle:"700"
        }).setOrigin(0.5);

        this.tweens.add({
            targets:title,
            scale:1.05,
            duration:1200,
            yoyo:true,
            repeat:-1
        });

        const subtitle = this.add.text(centerX,190,"لعبة تصنع لحظات لا تُنسى",{
            fontFamily:"Alexandria",
            fontSize:"20px",
            color:"#c7c9d3"
        }).setOrigin(0.5);

        const buttons = [
            {text:"ابدأ اللعبة", y:320, action:()=>this.scene.start("PlayerSetup")},
            {text:"الإعدادات", y:410, action:()=>this.scene.start("Settings")},
            {text:"مشاركة اللعبة", y:500, action:()=>shareGame()},
            {text:"تكبير الشاشة", y:590, action:()=>toggleFullscreen()}
        ];

        buttons.forEach(btn=>{
            this.createButton(centerX,btn.y,btn.text,btn.action);
        });

        const dev = this.add.text(centerX,this.cameras.main.height-40,"برمجة محمد جبلي",{
            fontFamily:"Alexandria",
            fontSize:"16px",
            color:"#00d4ff"
        })
        .setOrigin(0.5)
        .setInteractive({useHandCursor:true});

        dev.on("pointerdown",()=>{
            window.open("https://wa.me/966505501575","_blank");
        });

    }

    createBackground(){

        const g = this.add.graphics();

        g.fillGradientStyle(0x0f1020,0x1b1f3a,0x1b1f3a,0x0f1020,1);
        g.fillRect(0,0,this.cameras.main.width,this.cameras.main.height);

        for(let i=0;i<25;i++){

            const circle = this.add.circle(
                Phaser.Math.Between(0,window.innerWidth),
                Phaser.Math.Between(0,window.innerHeight),
                Phaser.Math.Between(20,80),
                Phaser.Display.Color.RandomRGB().color,
                0.08
            );

            this.tweens.add({
                targets:circle,
                y:circle.y-40,
                duration:Phaser.Math.Between(3000,6000),
                yoyo:true,
                repeat:-1
            });
        }

    }

    createButton(x,y,text,callback){

        const container = this.add.container(x,y);

        const bg = this.add.rectangle(0,0,320,72,0xffffff,0.08)
        .setStrokeStyle(2,0xffffff,0.2)
        .setOrigin(0.5);

        const label = this.add.text(0,0,text,{
            fontFamily:"Alexandria",
            fontSize:"24px",
            color:"#ffffff"
        }).setOrigin(0.5);

        container.add([bg,label]);

        bg.setInteractive({useHandCursor:true});

        bg.on("pointerdown",()=>{

            vibrate(40);

            this.tweens.add({
                targets:container,
                scale:0.95,
                duration:80,
                yoyo:true
            });

            playBeep(200,0.05);

}

class PlayerSetup extends Phaser.Scene{

    constructor(){
        super("PlayerSetup");
    }

    create(){

        this.createBackground();

        const centerX = this.cameras.main.width/2;

        this.add.text(centerX,100,"أدخلوا أسماءكم",{
            fontFamily:"Alexandria",
            fontSize:"36px",
            color:"#fff"
        }).setOrigin(0.5);

        const input1 = this.createHTMLInput(centerX,250,"اسم اللاعب الأول");
        const input2 = this.createHTMLInput(centerX,360,"اسم اللاعب الثاني");

        this.createButton(centerX,520,"ابدأ",()=>{

            state.players[0].name = input1.value || "اللاعب الأول";
            state.players[1].name = input2.value || "اللاعب الثاني";

            this.scene.start("QuestionScene");
        });

    }

    createBackground(){

        const g = this.add.graphics();

        g.fillGradientStyle(0x0f1020,0x1b1f3a,0x1b1f3a,0x0f1020,1);
        g.fillRect(0,0,this.cameras.main.width,this.cameras.main.height);

    }

    createHTMLInput(x,y,placeholder){

        const input = document.createElement("input");

        input.placeholder = placeholder;

        Object.assign(input.style,{
            position:"absolute",
            left:"50%",
            top:y+"px",
            transform:"translateX(-50%)",
            width:"80%",
            maxWidth:"340px",
            height:"60px",
            borderRadius:"18px",
            border:"2px solid rgba(255,255,255,0.15)",
            background:"rgba(255,255,255,0.08)",
            color:"white",
            fontFamily:"Alexandria",
            fontSize:"20px",
            padding:"0 20px",
            outline:"none",
            textAlign:"center",
            backdropFilter:"blur(10px)"
        });

        document.body.appendChild(input);

        this.events.on("shutdown",()=>{
            input.remove();
        });

        return input;

    }

    createButton(x,y,text,callback){

        const bg = this.add.rectangle(x,y,260,70,0xff4d8d)
        .setInteractive({useHandCursor:true});

        bg.setRadius(24);

        const label = this.add.text(x,y,text,{
            fontFamily:"Alexandria",
            fontSize:"28px",
            color:"#fff"
        }).setOrigin(0.5);

        bg.on("pointerdown",()=>{

            vibrate(50);

            playBeep(250,0.05);

            callback();
        });

    }

}

class QuestionScene extends Phaser.Scene{

    constructor(){
        super("QuestionScene");
    }

    create(){

        this.createBackground();

        this.question = Phaser.Utils.Array.GetRandom(state.questions);

        state.currentQuestion = this.question;

        this.renderQuestion();

    }

    createBackground(){

        const g = this.add.graphics();

        g.fillGradientStyle(0x0f1020,0x1b1f3a,0x1b1f3a,0x0f1020,1);
        g.fillRect(0,0,this.cameras.main.width,this.cameras.main.height);

    }

    renderQuestion(){

        const centerX = this.cameras.main.width/2;

        const currentPlayer = state.currentPlayer;

        const player = state.players[currentPlayer];

        this.add.text(centerX,70,
            "دور "+player.name+" "+player.emoji,{
            fontFamily:"Alexandria",
            fontSize:"30px",
            color:"#fff"
        }).setOrigin(0.5);

        const timerText = this.add.text(centerX,130,"5",{
            fontFamily:"Alexandria",
            fontSize:"48px",
            color:"#ff4d8d"
        }).setOrigin(0.5);

        let time = 5;

        const timer = this.time.addEvent({
            delay:1000,
            loop:true,
            callback:()=>{

                time--;

                timerText.setText(time);

                playBeep(400,0.03);

                if(time<=0){
                    timer.remove(false);
                }
            }
        });

        const card = this.add.rectangle(centerX,250,340,150,0xffffff,0.08)
        .setStrokeStyle(2,0xffffff,0.15);

        card.setRadius(24);

        this.add.text(centerX,250,this.question.question,{
            fontFamily:"Alexandria",
            fontSize:"24px",
            color:"#fff",
            align:"center",
            wordWrap:{width:300}
        }).setOrigin(0.5);

        this.question.options.forEach((opt,index)=>{

            const y = 390 + index90;

            const btn = this.add.rectangle(centerX,y,320,68,0xffffff,0.08)
            .setStrokeStyle(2,0xffffff,0.15)
            .setInteractive({useHandCursor:true});

            btn.setRadius(20);

            const text = this.add.text(centerX,y,opt,{
                fontFamily:"Alexandria",
                fontSize:"22px",
                color:"#fff"
            }).setOrigin(0.5);

            btn.on("pointerdown",()=>{

                vibrate(80);

                playBeep(180,0.08);

                this.cameras.main.shake(120,0.002);

                if(currentPlayer===0){

                    state.player1Answer = opt;
                    state.currentPlayer = 1;

                    this.scene.restart();

                }else{

                    state.player2Answer = opt;
                    state.currentPlayer = 0;

                    this.scene.start("RevealScene");

                }

            });

        });

    }

}

class RevealScene extends Phaser.Scene{

    constructor(){
        super("RevealScene");
    }

    create(){

        this.createBackground();

        const q = state.currentQuestion;

        const centerX = this.cameras.main.width/2;

        const match = state.player1Answer === state.player2Answer;

        this.add.text(centerX,90,"النتيجة",{
            fontFamily:"Alexandria",
            fontSize:"44px",
            color:"#fff"
        }).setOrigin(0.5);

        const answer1 = this.add.text(centerX,250,
            state.players[0].name+" اختار:\n"+state.player1Answer,{
            fontFamily:"Alexandria",
            fontSize:"24px",
            align:"center",
            color:"#fff"
        }).setOrigin(0.5);

        const answer2 = this.add.text(centerX,420,
            state.players[1].name+" اختار:\n"+state.player2Answer,{
            fontFamily:"Alexandria",
            fontSize:"24px",
            align:"center",
            color:"#fff"
        }).setOrigin(0.5);

        if(match){

            memory.matches++;

            this.cameras.main.shake(400,0.005);

            this.add.particles(0,0,'',{

            });

            playBeep(600,0.15);

            this.add.text(centerX,560,"🎉 "+q.funnyCommentMatch,{
                fontFamily:"Alexandria",
                fontSize:"26px",
                color:"#00e676",
                align:"center",
                wordWrap:{width:340}
            }).setOrigin(0.5);

        }else{

            memory.mismatches++;

            playBeep(120,0.2);

            this.cameras.main.flash(300,255,0,0);

            this.add.text(centerX,560,"💀 "+q.funnyCommentMismatch,{
                fontFamily:"Alexandria",
                fontSize:"26px",
                color:"#ff5252",
                align:"center",
                wordWrap:{width:340}
            }).setOrigin(0.5);

        }

        this.add.text(centerX,650,
            dynamicComment(),{
            fontFamily:"Alexandria",
            fontSize:"18px",
            color:"#c7c9d3",
            align:"center",
            wordWrap:{width:320}
        }).setOrigin(0.5);

        this.createButton(centerX,760,"السؤال التالي",()=>{

            state.player1Answer = null;
            state.player2Answer = null;

            this.scene.start("QuestionScene");
        });

    }

    createBackground(){

        const g = this.add.graphics();

        g.fillGradientStyle(0x0f1020,0x1b1f3a,0x1b1f3a,0x0f1020,1);
        g.fillRect(0,0,this.cameras.main.width,this.cameras.main.height);

    }

    createButton(x,y,text,callback){

        const bg = this.add.rectangle(x,y,300,70,0x7c5cff)
        .setInteractive({useHandCursor:true});

        bg.setRadius(22);

        const label = this.add.text(x,y,text,{
            fontFamily:"Alexandria",
            fontSize:"24px",
            color:"#fff"
        }).setOrigin(0.5);

        bg.on("pointerdown",()=>{

            vibrate(50);

            playBeep(250,0.05);

            callback();
        });

    }

}

function dynamicComment(){

    if(memory.matches > memory.mismatches){
        return "واضح إنكم تفكروا بنفس الطريقة 😂";
    }

    if(memory.mismatches > memory.matches){
        return "واضح إن الثقة بدأت تنهار 💀";
    }

    return "العلاقة ما زالت تحت الاختبار 👀";
}

function playBeep(freq,duration){

    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();

    const gain = ctx.createGain();

    osc.frequency.value = freq;

    osc.connect(gain);

    gain.connect(ctx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.00001,
        ctx.currentTime + duration
    );

    osc.stop(ctx.currentTime + duration);

}

function vibrate(ms){

    if(navigator.vibrate){
        navigator.vibrate(ms);
    }

}

async function shareGame(){

    const data = {
        title:"أنا وأنت",
        text:"لعبة اجتماعية مضحكة لشخصين على نفس الجوال 😂",
        url:location.href
    };

    if(navigator.share){

        try{
            await navigator.share(data);
        }catch(e){}

    }else{

        navigator.clipboard.writeText(location.href);

        alert("تم نسخ رابط اللعبة");
    }

}

function toggleFullscreen(){

    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }

}

function copyPrompt(){

    const prompt = Generate Arabic social party game questions in JSON format.  Requirements: - Funny - Emotional - Chaotic - Meme-worthy - 4 answer options - Arabic only - Short readable text  JSON format: {  "packName":"",  "language":"ar",  "questions":[] };

    navigator.clipboard.writeText(prompt);

    alert("تم نسخ الـ Prompt");
}

function pasteJSON(){

    const raw = prompt("الصق JSON هنا");

    if(!raw) return;

    try{

        const parsed = JSON.parse(raw);

        if(!parsed.questions){
            throw new Error();
        }

        localStorage.setItem("customQuestions",raw);

        state.questions = parsed.questions;

        alert("تم حفظ الأسئلة");

    }catch(e){

        alert("JSON غير صالح");

    }

}

const config = {

    type:Phaser.AUTO,

    parent:"game",

    width:window.innerWidth,

    height:window.innerHeight,

    backgroundColor:"#0f1020",

    scale:{
        mode:Phaser.Scale.RESIZE,
        autoCenter:Phaser.Scale.CENTER_BOTH
    },

    scene:[
        MainMenu,
        PlayerSetup,
        QuestionScene,
        RevealScene,
        Settings
    ]

};

new Phaser.Game(config);

</script>
